<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G12 Trading Center v2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        body { background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 100%); min-height: 100vh; font-family: 'Segoe UI', system-ui, sans-serif; }
        .glass { background: rgba(26, 26, 46, 0.95); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; }
        .green { color: #00d26a; } .red { color: #ff4757; }
        .yellow { color: #ffc312; } .blue { color: #3498db; }
        .pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
    </style>
</head>
<body class="text-white p-4">
    <div class="max-w-[2000px] mx-auto">
        <header class="glass p-4 mb-4 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <div class="w-3 h-3 bg-green-500 rounded-full pulse"></div>
                <h1 class="text-2xl font-bold bg-gradient-to-r from-green-400 to-blue-500 bg-clip-text text-transparent">G12 Trading Center v2.0</h1>
            </div>
            <div class="flex items-center gap-4">
                <span class="text-slate-400 text-sm">Updated: <span id="lastUpdate">--:--:--</span></span>
                <button onclick="refreshAll()" class="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded-lg transition">Refresh</button>
            </div>
        </header>

        <!-- Asset Summary -->
        <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-7 gap-3 mb-4">
            <div class="glass p-3 text-center"><div class="text-slate-400 text-xs mb-1">Total Assets</div><div class="text-2xl font-bold green" id="total">$0</div></div>
            <div class="glass p-3 text-center"><div class="text-slate-400 text-xs mb-1">Spot</div><div class="text-2xl font-bold" id="spot">$0</div></div>
            <div class="glass p-3 text-center"><div class="text-slate-400 text-xs mb-1">Futures</div><div class="text-2xl font-bold yellow" id="futures">$0</div></div>
            <div class="glass p-3 text-center"><div class="text-slate-400 text-xs mb-1">Margin</div><div class="text-2xl font-bold blue" id="margin">$0</div></div>
            <div class="glass p-3 text-center"><div class="text-slate-400 text-xs mb-1">Signals</div><div class="text-2xl font-bold" id="signals">0</div></div>
            <div class="glass p-3 text-center"><div class="text-slate-400 text-xs mb-1">Executed</div><div class="text-2xl font-bold green" id="executed">0</div></div>
            <div class="glass p-3 text-center"><div class="text-slate-400 text-xs mb-1">Win Rate</div><div class="text-2xl font-bold green" id="winRate">69%</div></div>
        </div>

        <!-- Main Grid -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-4">
            <!-- Spot Wallet -->
            <div class="glass p-4">
                <h2 class="text-lg font-semibold mb-3">Spot Wallet</h2>
                <div id="spotAssets" class="space-y-2 max-h-64 overflow-y-auto"></div>
            </div>

            <!-- Futures Wallet -->
            <div class="glass p-4">
                <h2 class="text-lg font-semibold mb-3">Futures Wallet</h2>
                <div id="futuresWallet" class="space-y-2"></div>
            </div>

            <!-- Margin Account -->
            <div class="glass p-4">
                <h2 class="text-lg font-semibold mb-3">Margin Account</h2>
                <div id="marginAccount"></div>
            </div>
        </div>

        <!-- K-Line Chart -->
        <div class="glass p-4 mt-4">
            <div class="flex justify-between items-center mb-3">
                <h2 class="text-lg font-semibold">K-Line Chart</h2>
                <select id="coinSelect" onchange="updateKline()" class="bg-slate-700 text-white px-3 py-1 rounded text-sm">
                    <option value="BTCUSDT">BTC</option><option value="ETHUSDT">ETH</option>
                    <option value="SOLUSDT">SOL</option><option value="XRPUSDT">XRP</option>
                </select>
            </div>
            <div id="klineChart" style="height: 300px;"></div>
        </div>

        <!-- Trade History -->
        <div class="glass p-4 mt-4">
            <h2 class="text-lg font-semibold mb-3">Recent Trade Signals</h2>
            <div id="tradeHistory" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3 max-h-96 overflow-y-auto"></div>
        </div>
    </div>

    <script>
        const PRICES = {BTC:80121,ETH:2800,SOL:95,XRP:1.5,ADA:0.35,DOGE:0.12,LINK:12,USDT:1};

        async function refreshAll() {
            try {
                const resp = await fetch('/api/g12_data');
                const data = await resp.json();
                
                // Calculate totals
                let spotTotal = 0;
                let spotHtml = '';
                for (const [asset, d] of Object.entries(data.spot || {})) {
                    const price = PRICES[asset] || 1;
                    const value = d.total * price;
                    spotTotal += value;
                    if (value > 1) {
                        spotHtml += '<div class="flex justify-between items-center p-2 bg-slate-800/50 rounded"><span>' + asset + '</span><span class="yellow">$' + value.toFixed(2) + '</span></div>';
                    }
                }
                document.getElementById('spotAssets').innerHTML = spotHtml || '<div class="text-slate-500">No assets</div>';
                document.getElementById('spot').textContent = '$' + spotTotal.toFixed(2);
                
                // Futures
                const futBalance = (data.futures && data.futures.USDT) ? data.futures.USDT.balance : 0;
                document.getElementById('futures').textContent = '$' + futBalance.toFixed(2);
                document.getElementById('futuresWallet').innerHTML = 
                    '<div class="p-3 bg-slate-800/50 rounded"><div class="text-slate-400 text-sm">USDT Balance</div><div class="text-xl font-bold yellow">$' + futBalance.toFixed(2) + '</div></div>' +
                    '<div class="p-3 bg-slate-800/50 rounded"><div class="text-slate-400 text-sm">Available</div><div class="text-xl font-bold">$' + ((data.futures && data.futures.USDT) ? data.futures.USDT.available.toFixed(2) : '0.00') + '</div></div>';
                
                // Margin
                const marginValue = (data.margin && data.margin.totalCollateralValue) ? data.margin.totalCollateralValue : 0;
                document.getElementById('margin').textContent = '$' + marginValue.toFixed(2);
                document.getElementById('marginAccount').innerHTML = 
                    '<div class="p-3 bg-slate-800/50 rounded"><div class="text-slate-400 text-sm">Collateral</div><div class="text-xl font-bold blue">$' + marginValue.toFixed(2) + '</div></div>' +
                    '<div class="p-3 bg-slate-800/50 rounded mt-2"><div class="text-slate-400 text-sm">Margin Level</div><div class="text-xl font-bold">' + ((data.margin && data.margin.marginLevel) || 'N/A') + '</div></div>';
                
                // Total
                const total = spotTotal + futBalance + marginValue;
                document.getElementById('total').textContent = '$' + total.toFixed(2);
                
                // Stats
                if (data.stats) {
                    document.getElementById('signals').textContent = data.stats.total_signals || 0;
                    document.getElementById('executed').textContent = data.stats.executed_count || 0;
                }
                
                // Trade History
                let tradesHtml = '';
                (data.trades || []).slice(-12).reverse().forEach(t => {
                    const time = new Date(t.time).toLocaleTimeString();
                    const signals = t.signals || [];
                    const sig = signals[0] || {};
                    const cls = sig.type && sig.type.includes('SHORT') ? 'red' : 'green';
                    tradesHtml += '<div class="p-3 bg-slate-800/50 rounded"><div class="flex justify-between"><span class="font-bold ' + cls + '">' + (sig.type || 'N/A') + '</span><span class="text-slate-400">' + (sig.coin || '') + '</span><span class="text-slate-500 text-xs">' + time + '</span></div><div class="text-sm text-slate-400 mt-1">$' + (sig.price || 0).toFixed(2) + ' | ' + (sig.reason || '') + '</div><div class="text-xs text-slate-600 mt-1">Balance: $' + (t.balance || 0).toFixed(2) + '</div></div>';
                });
                document.getElementById('tradeHistory').innerHTML = tradesHtml || '<div class="text-slate-500">No trades</div>';
                
                document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString();
                updateKline();
            } catch (e) {
                console.error('API error:', e);
            }
        }

        function updateKline() {
            const coin = document.getElementById('coinSelect').value;
            const base = PRICES[coin.replace('USDT','')] || 100;
            const chartData = [];
            for (let i = 0; i < 50; i++) {
                const o = base * (0.99 + Math.random() * 0.02);
                const c = base * (0.99 + Math.random() * 0.02);
                chartData.push({x: i, open: o, high: Math.max(o,c)*1.001, low: Math.min(o,c)*0.999, close: c});
            }
            const trace = {
                x: chartData.map(d => d.x), open: chartData.map(d => d.open), high: chartData.map(d => d.high),
                low: chartData.map(d => d.low), close: chartData.map(d => d.close),
                type: 'candlestick', name: coin,
                increasing: {line: {color: '#00d26a'}},
                decreasing: {line: {color: '#ff4757'}}
            };
            Plotly.newPlot('klineChart', [trace], {
                paper_bgcolor: 'transparent', plot_bgcolor: 'transparent',
                font: {color: '#94a3b8'}, height: 290,
                xaxis: {gridcolor: '#2a2a4a'}, yaxis: {gridcolor: '#2a2a4a', tickprefix: '$'}
            }, {displayModeBar: false});
        }

        document.addEventListener('DOMContentLoaded', () => {
            refreshAll();
            setInterval(refreshAll, 15000);
        });
    </script>
</body>
</html>
