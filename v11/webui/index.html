<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q@C v11 Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0f; color: #fff; min-height: 100vh; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        h1 { text-align: center; padding: 20px; color: #00d4ff; }
        .status-bar { display: flex; justify-content: space-around; background: #1a1a2e; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        .status-item { text-align: center; }
        .status-value { font-size: 24px; font-weight: bold; color: #00d4ff; }
        .status-label { color: #888; font-size: 12px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .card { background: #1a1a2e; border-radius: 10px; padding: 20px; }
        .card h3 { color: #00d4ff; margin-bottom: 15px; }
        .signal-list { list-style: none; }
        .signal-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #2a2a4e; }
        .signal-item:last-child { border: none; }
        .buy { color: #00ff88; }
        .sell { color: #ff4444; }
        .hold { color: #ffaa00; }
        .btn { background: #00d4ff; color: #000; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; margin: 5px; }
        .btn:hover { background: #00a8cc; }
        .log { background: #000; padding: 10px; border-radius: 5px; max-height: 200px; overflow-y: auto; font-family: monospace; font-size: 12px; }
        .weights { display: flex; gap: 10px; margin-top: 10px; }
        .weight-bar { flex: 1; height: 20px; background: #2a2a4e; border-radius: 3px; overflow: hidden; }
        .weight-fill { height: 100%; }
        .v8 { background: #00d4ff; }
        .g12 { background: #ff00ff; }
        .miro { background: #00ff88; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Q@C v11 Dashboard</h1>
        
        <div class="status-bar">
            <div class="status-item">
                <div class="status-value" id="version">11.0.0</div>
                <div class="status-label">版本</div>
            </div>
            <div class="status-item">
                <div class="status-value" id="mode">SIMULATE</div>
                <div class="status-label">模式</div>
            </div>
            <div class="status-item">
                <div class="status-value" id="cycle">0</div>
                <div class="status-label">周期</div>
            </div>
            <div class="status-item">
                <div class="status-value" id="capital">$10,000</div>
                <div class="status-label">资金</div>
            </div>
            <div class="status-item">
                <div class="status-value" id="pnl">$0</div>
                <div class="status-label">盈亏</div>
            </div>
        </div>

        <div class="grid">
            <div class="card">
                <h3>📊 三重权重</h3>
                <div class="weights">
                    <div class="weight-bar"><div class="weight-fill v8" style="width:50%"></div></div>
                    <div class="weight-bar"><div class="weight-fill g12" style="width:30%"></div></div>
                    <div class="weight-bar"><div class="weight-fill miro" style="width:20%"></div></div>
                </div>
                <div style="display:flex;gap:10px;margin-top:5px;font-size:12px;">
                    <span style="color:#00d4ff">V8 50%</span>
                    <span style="color:#ff00ff">G12 30%</span>
                    <span style="color:#00ff88">Miro 20%</span>
                </div>
            </div>

            <div class="card">
                <h3>📈 信号分析</h3>
                <ul class="signal-list" id="signals">
                    <li class="signal-item"><span>BTCUSDT</span><span class="hold">HOLD 50</span></li>
                    <li class="signal-item"><span>ETHUSDT</span><span class="hold">HOLD 50</span></li>
                </ul>
            </div>

            <div class="card">
                <h3>💰 持仓</h3>
                <ul class="signal-list" id="positions">
                    <li class="signal-item"><span>无持仓</span><span>-</span></li>
                </ul>
            </div>

            <div class="card">
                <h3>📋 日志</h3>
                <div class="log" id="log">系统初始化...</div>
            </div>
        </div>

        <div style="text-align:center;margin-top:20px;">
            <button class="btn" onclick="startTrading()">启动</button>
            <button class="btn" onclick="stopTrading()">停止</button>
            <button class="btn" onclick="refresh()">刷新</button>
        </div>
    </div>

    <script>
        function startTrading() {
            document.getElementById('log').innerHTML += '<br>🚀 启动交易系统...';
        }
        function stopTrading() {
            document.getElementById('log').innerHTML += '<br>⏹️ 停止交易系统...';
        }
        function refresh() {
            fetch('/home/goose/.openclaw/workspace/qcv11_status.json')
                .then(r => r.json())
                .then(data => {
                    document.getElementById('mode').textContent = data.mode || 'SIMULATE';
                    document.getElementById('cycle').textContent = data.cycles || 0;
                })
                .catch(() => {});
        }
        setInterval(refresh, 5000);
    </script>
</body>
</html>
