<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G29 Full Auto - Trading Dashboard</title>
    <link rel="manifest" href="manifest.json">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0a0a0f; color: #fff; min-height: 100vh; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        h1 { color: #00ff88; text-align: center; margin: 20px 0; }
        .status-bar { display: flex; justify-content: space-around; background: #1a1a2e; padding: 20px; border-radius: 10px; margin: 20px 0; }
        .stat { text-align: center; }
        .stat-value { font-size: 2em; color: #00ff88; }
        .stat-label { color: #888; margin-top: 5px; }
        .positions { background: #1a1a2e; border-radius: 10px; padding: 20px; margin: 20px 0; }
        .position { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #333; }
        .position:last-child { border-bottom: none; }
        .coin { color: #fff; font-weight: bold; }
        .buy { color: #00ff88; }
        .sell { color: #ff4757; }
        .log-container { background: #1a1a2e; border-radius: 10px; padding: 20px; max-height: 300px; overflow-y: auto; }
        .log-entry { font-family: monospace; font-size: 12px; padding: 5px; border-bottom: 1px solid #333; }
        .green { color: #00ff88; }
        .red { color: #ff4757; }
        .yellow { color: #ffd93d; }
        .btn { background: #00ff88; color: #000; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn:hover { background: #00cc6a; }
        .controls { text-align: center; margin: 20px 0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤖 G29 Full Auto Trading</h1>
        <div class="status-bar">
            <div class="stat"><div class="stat-value" id="total">--</div><div class="stat-label">Total Assets ($)</div></div>
            <div class="stat"><div class="stat-value" id="usdt">--</div><div class="stat-label">USDT Balance</div></div>
            <div class="stat"><div class="stat-value" id="signals">--</div><div class="stat-label">Active Signals</div></div>
        </div>
        <div class="controls">
            <button class="btn" onclick="startBot()">▶ Start</button>
            <button class="btn" onclick="stopBot()">⏹ Stop</button>
            <button class="btn" onclick="refreshData()">🔄 Refresh</button>
        </div>
        <div class="positions">
            <h2>📊 Holdings</h2>
            <div id="holdings">Loading...</div>
        </div>
        <div class="log-container">
            <h2>📜 Recent Activity</h2>
            <div id="logs">Loading...</div>
        </div>
    </div>
    <script>
        async function refreshData() {
            try {
                const resp = await fetch('http://localhost:8091/api/data');
                const data = await resp.json();
                document.getElementById('total').textContent = '$' + data.total.toFixed(2);
                document.getElementById('usdt').textContent = '$' + (data.spot * 0.01).toFixed(2);
                let signals = 0;
                data.holdings.forEach(h => { if (h.value > 50) signals++; });
                document.getElementById('signals').textContent = signals;
                
                let html = '';
                data.holdings.slice(0, 8).forEach(h => {
                    html += `<div class="position">
                        <span class="coin">${h.coin}</span>
                        <span>${h.amount.toFixed(4)}</span>
                        <span class="buy">$${h.value.toFixed(2)}</span>
                    </div>`;
                });
                document.getElementById('holdings').innerHTML = html;
            } catch(e) { console.log(e); }
            
            // Load logs
            try {
                const logResp = await fetch('/logs/g29.log');
                const logText = await logResp.text();
                const lines = logText.split('\n').slice(-20);
                let logHtml = '';
                lines.forEach(line => {
                    if (line.includes('✅')) line = `<span class="green">${line}</span>`;
                    else if (line.includes('❌')) line = `<span class="red">${line}</span>`;
                    else if (line.includes('⚠️')) line = `<span class="yellow">${line}</span>`;
                    logHtml += `<div class="log-entry">${line}</div>`;
                });
                document.getElementById('logs').innerHTML = logHtml;
            } catch(e) {}
        }
        
        function startBot() { alert('Bot is running - use terminal to control'); }
        function stopBot() { alert('Stop bot via terminal: pkill -f g29_full.py'); }
        
        setInterval(refreshData, 5000);
        refreshData();
    </script>
</body>
</html>
